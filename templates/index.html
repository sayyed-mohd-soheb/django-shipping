{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <title>Find Best Box</title>
</head>
<body>

<h2>Find Best Box</h2>

<div class="container">
    <form method="POST">
        {% csrf_token %}

        <label>Length:</label>
        <input type="number" name="length">

        <label>Width:</label>
        <input type="number" name="width">

        <label>Height:</label>
        <input type="number" name="height">

        <label>Weight:</label>
        <input type="number" name="weight">

        <button type="submit">Find Box</button>
    </form>

    {% if box %}
        <div class="result">
            <strong>Best Box:</strong> {{ box }}
        </div>
    {% endif %}

    {% if error %}
        <div class="error">
            {{ error }}
        </div>
    {% endif %}
</div>

</body>
</html>
